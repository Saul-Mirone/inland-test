<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag: {{tag}} - {{name}}</title>
    <meta name="description" content="Articles tagged with '{{tag}}'">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../../styles.css">

    <!-- Theme detection -->
    <script>
    (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body>
    <header class="site-header header-minimal">
        <div class="container" style="display:flex;justify-content:space-between;align-items:center">
            <h3 class="site-title">
                <a href="../../">{{name}}</a>
            </h3>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            <header class="tag-header">
                <h1 class="tag-title"><svg class="tag-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>{{tag}}</h1>
                <p class="tag-count">{{count}} {{countLabel}}</p>
            </header>

            <div class="articles-list">
                {{#articles}}
                <article class="article-item">
                    <h2 class="article-item-title">
                        <a href="../../{{slug}}/">{{title}}</a>
                    </h2>
                    <div class="article-meta">
                        <time datetime="{{date}}" class="article-date">{{formattedDate}}</time>
                        {{#tags}}
                        <a href="../{{slug}}/" class="article-tag {{#active}}article-tag-active{{/active}}">{{name}}</a>
                        {{/tags}}
                    </div>
                    {{#excerpt}}
                    <p class="article-excerpt">{{excerpt}}</p>
                    {{/excerpt}}
                </article>
                {{/articles}}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-links">
                <a href="../../rss.xml">rss</a>
            </div>
            <span>Powered by <a href="https://github.com/Saul-Mirone/inland" target="_blank" rel="noopener">Inland</a></span>
        </div>
    </footer>

    <script src="../../script.js"></script>
</body>
</html>
